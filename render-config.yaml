model:
  default: openai/gpt-oss-120b
  provider: nvidia
  base_url: https://integrate.api.nvidia.com/v1
fallback_model:
  provider: nvidia
  model: nvidia/nemotron-3-super-120b-a12b
mcp_servers:
  composio:
    url: "https://connect.composio.dev/mcp"
    headers:
      x-consumer-api-key: "${COMPOSIO_API_KEY}"
    connect_timeout: 60
    timeout: 180
    supports_parallel_tool_calls: true
platform_toolsets:
  telegram:
    - hermes-telegram
    - mcp-composio
telegram:
  reactions: false
  channel_prompts: {}
  allowed_chats: "5567488087"
gateway:
  strict: false
streaming:
  enabled: false
security:
  redact_secrets: true
  allow_lazy_installs: true
display:
  personality: technical
  final_response_markdown: strip
  platforms:
    telegram:
      streaming: true
agent:
  gateway_timeout: 3600
  api_max_retries: 3
  tool_use_enforcement: required
  reasoning_effort: high
_config_version: 27
