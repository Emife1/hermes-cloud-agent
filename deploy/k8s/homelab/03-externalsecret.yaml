apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hermes-cloud-agent-runtime
  namespace: hermes-olufunke
  labels:
    app.kubernetes.io/name: hermes-cloud-agent
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-hermes-olufunke-runtime
  target:
    name: hermes-cloud-agent-runtime
    creationPolicy: Owner
  data:
    - secretKey: TELEGRAM_BOT_TOKEN
      remoteRef:
        key: temitayo/olufunke/hermes-cloud-agent/runtime
        property: TELEGRAM_BOT_TOKEN
    - secretKey: COMPOSIO_API_KEY
      remoteRef:
        key: temitayo/olufunke/hermes-cloud-agent/runtime
        property: COMPOSIO_API_KEY
    - secretKey: NVIDIA_API_KEY
      remoteRef:
        key: temitayo/olufunke/hermes-cloud-agent/runtime
        property: NVIDIA_API_KEY
    - secretKey: MODEL
      remoteRef:
        key: temitayo/olufunke/hermes-cloud-agent/runtime
        property: MODEL
    - secretKey: PROVIDER
      remoteRef:
        key: temitayo/olufunke/hermes-cloud-agent/runtime
        property: PROVIDER
    - secretKey: HERMES_MODEL
      remoteRef:
        key: temitayo/olufunke/hermes-cloud-agent/runtime
        property: HERMES_MODEL
    - secretKey: HERMES_PROVIDER
      remoteRef:
        key: temitayo/olufunke/hermes-cloud-agent/runtime
        property: HERMES_PROVIDER
