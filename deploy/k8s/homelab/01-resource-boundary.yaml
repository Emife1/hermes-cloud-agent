apiVersion: v1
kind: ResourceQuota
metadata:
  name: hermes-olufunke-quota
  namespace: hermes-olufunke
spec:
  hard:
    requests.cpu: "500m"
    requests.memory: "768Mi"
    limits.cpu: "1"
    limits.memory: "1Gi"
    pods: "3"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: hermes-olufunke-defaults
  namespace: hermes-olufunke
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 50m
        memory: 128Mi
      default:
        cpu: 500m
        memory: 512Mi
