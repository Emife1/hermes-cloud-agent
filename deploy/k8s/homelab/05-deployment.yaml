apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-cloud-agent
  namespace: hermes-olufunke
  labels:
    app.kubernetes.io/name: hermes-cloud-agent
    app.kubernetes.io/part-of: hermes
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: hermes-cloud-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hermes-cloud-agent
        app.kubernetes.io/part-of: hermes
    spec:
      serviceAccountName: hermes-cloud-agent
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: hermes
          image: ghcr.io/emife1/hermes-cloud-agent:clean-render
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 10000
          envFrom:
            - configMapRef:
                name: hermes-cloud-agent-config
            - secretRef:
                name: hermes-cloud-agent-runtime
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: tmp
          emptyDir: {}
