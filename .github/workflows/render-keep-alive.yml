name: Keep Render Hermes Awake

on:
  schedule:
    - cron: "7,17,27,37,47,57 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: render-hermes-keepalive
  cancel-in-progress: true

jobs:
  ping:
    name: Ping Render readiness endpoint
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: Wake service and wait for gateway readiness
        env:
          RENDER_BASE_URL: https://hermes-cloud-agent.onrender.com
        run: |
          set -euo pipefail

          echo "Waking ${RENDER_BASE_URL}"
          curl --silent --show-error --location --max-time 45 "${RENDER_BASE_URL}/healthz" || true

          echo "Polling ${RENDER_BASE_URL}/readyz"
          ready_code="000"
          for attempt in $(seq 1 12); do
            ready_code="$({ curl \
              --silent \
              --show-error \
              --location \
              --max-time 20 \
              --output /tmp/hermes-ready-body.txt \
              --write-out "%{http_code}" \
              "${RENDER_BASE_URL}/readyz" || true; })"

            echo "Attempt ${attempt}/12 readiness HTTP status: ${ready_code}"
            cat /tmp/hermes-ready-body.txt || true
            echo

            if [ "${ready_code}" -ge 200 ] && [ "${ready_code}" -lt 300 ]; then
              echo "Hermes gateway is ready."
              exit 0
            fi

            sleep 10
          done

          echo "Hermes gateway readiness failed after polling. Last HTTP status: ${ready_code}"
          exit 1
