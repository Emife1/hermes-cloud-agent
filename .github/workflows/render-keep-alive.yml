name: Keep Render Hermes Awake

on:
  schedule:
    - cron: "7,17,27,37,47,57 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: render-hermes-keepalive
  cancel-in-progress: true

jobs:
  ping:
    name: Ping Render health endpoint
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Ping Render health endpoint
        env:
          RENDER_HEALTH_URL: https://hermes-cloud-agent.onrender.com/healthz
        run: |
          set -euo pipefail

          echo "Pinging ${RENDER_HEALTH_URL}"

          http_code="$(
            curl \
              --silent \
              --show-error \
              --location \
              --max-time 45 \
              --retry 2 \
              --retry-delay 10 \
              --output /tmp/render-health-body.txt \
              --write-out "%{http_code}" \
              "${RENDER_HEALTH_URL}"
          )"

          echo "HTTP status: ${http_code}"
          cat /tmp/render-health-body.txt || true

          if [ "${http_code}" -lt 200 ] || [ "${http_code}" -ge 300 ]; then
            echo "Render keepalive failed with HTTP ${http_code}"
            exit 1
          fi
