name: Build homelab image

on:
  workflow_dispatch:
  push:
    branches:
      - clean-render
    paths:
      - Dockerfile
      - entrypoint.sh
      - health_server.py
      - render-config.yaml
      - router.py
      - .github/workflows/ghcr-homelab-image.yml

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/emife1/hermes-cloud-agent

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/emife1/hermes-cloud-agent:clean-render
            ghcr.io/emife1/hermes-cloud-agent:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/Emife1/hermes-cloud-agent
            org.opencontainers.image.revision=${{ github.sha }}
